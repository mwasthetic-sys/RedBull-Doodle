
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedBull Doodle | High-Octane Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --rb-red: #E1002F;
            --rb-blue: #001D4D;
            --rb-yellow: #FFCC00;
            --rb-silver: #ADB3BC;
            --rb-dark: #000B1A;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--rb-dark);
            color: white;
            overflow-x: hidden;
        }
        .font-oswald {
            font-family: 'Oswald', sans-serif;
        }
        .energy-gradient {
            background: linear-gradient(135deg, var(--rb-red) 0%, #8B0000 100%);
        }
        .speed-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(225, 0, 47, 0.4), transparent);
            height: 1px;
            width: 100%;
            animation: move-lines 3s infinite linear;
        }
        @keyframes move-lines {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .glow-red {
            box-shadow: 0 0 20px rgba(225, 0, 47, 0.3);
        }
        .glow-yellow {
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
        }
        .action-button {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .action-button:hover {
            transform: skewX(-5deg) scale(1.05);
        }
        .skew-box {
            transform: skewX(-10deg);
        }
        .unskew-content {
            transform: skewX(10deg);
        }
    </style>
